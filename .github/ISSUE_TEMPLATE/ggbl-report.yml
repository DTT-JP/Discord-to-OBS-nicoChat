name: グローバルギルドブラックリストの推薦や通報など
description: サーバー（ギルド）をグローバルギルドブラックリストへ推薦・通報するためのテンプレートです。
title: "[Guild BL Report]: "
labels: ["gbl-report", "guild-blacklist"]
body:
  - type: input
    id: guild_name
    attributes:
      label: 対象サーバー名
      placeholder: "例: 〇〇コミュニティ"
    validations:
      required: true
  - type: input
    id: guild_id
    attributes:
      label: 対象サーバーID (ギルドID)
      placeholder: "例: 123456789012345678"
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: 推薦・通報理由
      description: 規約違反や迷惑行為の内容を具体的に記載してください。
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: 証拠・関連情報
      description: スクリーンショット、メッセージリンク、ログなどを記載してください。
    validations:
      required: true
