name: バグ報告
description: BOTの不具合や想定外の動作を報告します。
title: "[Bug]: "
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: バージョン
      description: `/status` のバージョン、またはコミットIDを記載してください。
      placeholder: "例: v2.0.0-dev17.05"
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: 実行環境
      description: 公開BOT利用 / セルフホスト、OS、Node.js 版を記載してください。
      placeholder: "例: セルフホスト / Windows 11 / Node 22.13.1"
    validations:
      required: true
  - type: dropdown
    id: reproducibility
    attributes:
      label: 再現率
      options:
        - 常に再現する（100%）
        - 高確率で再現する（70%以上）
        - たまに再現する（70%未満）
        - 1回しか発生していない
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 再現手順
      description: どの操作で問題が発生したか、順番に記載してください。
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期待した動作
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 実際の動作
    validations:
      required: true
  - type: textarea
    id: supplemental
    attributes:
      label: 補足情報
      description: エラーログ、スクリーンショット、発生環境など。
    validations:
      required: false
