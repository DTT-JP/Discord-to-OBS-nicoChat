<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Discord OBS Overlay</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      font-family:
        "MS P Gothic", "MS PGothic", "Mona",
        "IPA Pゴシック", "IPA PGothic", "Mplus 1p",
        "Hiragino Kaku Gothic ProN",
        "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji",
        sans-serif;
    }

    #stage {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    /* ── 認証画面 ── */
    #auth-screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.82);
      color: #fff;
      z-index: 9999;
      gap: 16px;
      padding: 20px;
    }

    #auth-screen h1 {
      font-size: clamp(1rem, 3vw, 1.4rem);
      letter-spacing: 0.05em;
    }

    #auth-code-display {
      font-size: clamp(1.5rem, 8vw, 3.5rem);
      font-weight: 700;
      letter-spacing: 0.3em;
      color: #57f287;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 0 20px rgba(87, 242, 135, 0.6);
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #auth-screen p      { font-size: clamp(0.7rem, 2vw, 0.9rem); color: #aaa; text-align: center; line-height: 1.6; }
    #auth-screen .error { color: #ed4245; font-size: clamp(0.8rem, 2.5vw, 1rem); }

    /* ── コメント共通 ── */
    .comment,
    .comment-fixed {
      position: absolute;
      pointer-events: none;
      display: inline-flex;
      flex-direction: column;
      align-items: flex-start;
      line-height: 1.3;
      text-shadow:
        -1px -1px 0 rgba(0,0,0,0.9),
         1px -1px 0 rgba(0,0,0,0.9),
        -1px  1px 0 rgba(0,0,0,0.9),
         1px  1px 0 rgba(0,0,0,0.9),
         0    2px 6px rgba(0,0,0,0.7);
    }

    /* ── 流れるコメント ── */
    .comment {
      left: 100vw;
      white-space: nowrap;
      animation: flow var(--duration, 6s) linear forwards;
      will-change: transform;
    }

    /* ── 固定コメント ── */
    .comment-fixed {
      white-space: nowrap;
      align-items: center;
      text-align: center;
      left: 50%;
      transform: translateX(-50%);
    }

    /* ── エフェクト: gaming ── */
    @keyframes gaming-color {
      0%   { color: #ff0000; }
      14%  { color: #ff8800; }
      28%  { color: #ffff00; }
      42%  { color: #00ff00; }
      57%  { color: #00ffff; }
      71%  { color: #0088ff; }
      85%  { color: #aa00ff; }
      100% { color: #ff0000; }
    }

    .effect-gaming .text-part {
      animation: gaming-color 1.5s linear infinite !important;
      color: unset !important;
    }

    /* ── エフェクト: _live（半透過） ── */
    .effect-live { opacity: 0.45; }

    /* ── flow アニメーション ── */
    @keyframes flow {
      from { transform: translateX(0); }
      to   { transform: translateX(calc(-1 * var(--distance, 200vw))); }
    }

    /* ── loop アニメーション ── */
    @keyframes flow-loop {
      from { transform: translateX(0); }
      to   { transform: translateX(calc(-1 * var(--distance, 200vw))); }
    }

    .effect-loop {
      animation: flow-loop var(--duration, 6s) linear infinite !important;
    }
  </style>
</head>
<body>
  <div id="auth-screen">
    <h1>🔐 認証コード</h1>
    <div id="auth-code-display">------</div>
    <p>
      Discordで以下のコマンドを実行してください<br />
      <strong>/auth [上記の6桁コード]</strong>
    </p>
  </div>

  <div id="stage"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/script.js"></script>
</body>
</html>
